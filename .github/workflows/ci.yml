name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-build-and-test:
    name: Core .NET build and tests
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"
      DOTNET_CONFIGURATION: Release
      CORE_PROJECTS: |
        src/Ariadne.Domain/Ariadne.Domain.csproj
        src/Ariadne.Application/Ariadne.Application.csproj
        src/Ariadne.Analytics/Ariadne.Analytics.csproj
        src/Ariadne.Infrastructure.Local/Ariadne.Infrastructure.Local.csproj
        src/Ariadne.SharedUi/Ariadne.SharedUi.csproj
        tests/Ariadne.Domain.Tests/Ariadne.Domain.Tests.csproj
        tests/Ariadne.Application.Tests/Ariadne.Application.Tests.csproj
        tests/Ariadne.Analytics.Tests/Ariadne.Analytics.Tests.csproj
        tests/Ariadne.Infrastructure.Local.Tests/Ariadne.Infrastructure.Local.Tests.csproj
      CORE_SOURCE_PROJECTS: |
        src/Ariadne.Domain/Ariadne.Domain.csproj
        src/Ariadne.Application/Ariadne.Application.csproj
        src/Ariadne.Analytics/Ariadne.Analytics.csproj
        src/Ariadne.Infrastructure.Local/Ariadne.Infrastructure.Local.csproj
        src/Ariadne.SharedUi/Ariadne.SharedUi.csproj
      CORE_TEST_PROJECTS: |
        tests/Ariadne.Domain.Tests/Ariadne.Domain.Tests.csproj
        tests/Ariadne.Application.Tests/Ariadne.Application.Tests.csproj
        tests/Ariadne.Analytics.Tests/Ariadne.Analytics.Tests.csproj
        tests/Ariadne.Infrastructure.Local.Tests/Ariadne.Infrastructure.Local.Tests.csproj

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore core projects
        shell: bash
        run: |
          while IFS= read -r project; do
            if [[ -n "$project" ]]; then
              dotnet restore "$project"
            fi
          done <<< "$CORE_PROJECTS"

      - name: Build core source projects
        shell: bash
        run: |
          while IFS= read -r project; do
            if [[ -n "$project" ]]; then
              dotnet build "$project" --configuration "$DOTNET_CONFIGURATION" --no-restore
            fi
          done <<< "$CORE_SOURCE_PROJECTS"

      - name: Run core tests
        shell: bash
        run: |
          while IFS= read -r project; do
            if [[ -n "$project" ]]; then
              dotnet test "$project" --configuration "$DOTNET_CONFIGURATION" --no-restore --verbosity normal
            fi
          done <<< "$CORE_TEST_PROJECTS"
