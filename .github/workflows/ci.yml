name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  non-maui-build-and-test:
    name: Non-MAUI .NET build and tests
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Ariadne.NonMaui.slnf

      - name: Build
        run: dotnet build Ariadne.NonMaui.slnf --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Ariadne.NonMaui.slnf --configuration Release --no-build --verbosity normal
