name: MAUI Android

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maui-android-build:
    name: MAUI Android build
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"
      DOTNET_CONFIGURATION: Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore MAUI Android project
        run: dotnet restore src/Ariadne.Maui/Ariadne.Maui.csproj -f net10.0-android

      - name: Build MAUI Android project
        run: dotnet build src/Ariadne.Maui/Ariadne.Maui.csproj -f net10.0-android --configuration "$DOTNET_CONFIGURATION" --no-restore
