version: 2

updates:
  - package-ecosystem: nuget
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    groups:
      nuget-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
    open-pull-requests-limit: 3
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
